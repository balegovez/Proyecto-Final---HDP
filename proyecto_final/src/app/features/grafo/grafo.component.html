<main class="grafo-wrapper">

  <!-- Header con título y leyenda (presentación pura, sin inputs) -->
  <app-grafo-header />

  <!-- Panel lateral: se muestra solo cuando hay una materia seleccionada -->
  @if (seleccion) {
    <app-panel-seleccion
      [seleccion]="seleccion"
      [todasMaterias]="pensumService.materias()"
      (cerrar)="limpiarSeleccion()"
    />
  }

  <!-- Estado de error del servicio -->
  @if (pensumService.error()) {
    <div class="estado-error">
      <p>{{ pensumService.error() }}</p>
    </div>
  }

  <!-- Canvas de Cytoscape con datos resueltos del servicio -->
  @if (!pensumService.cargando()) {
    <app-grafo-canvas
      [materias]="pensumService.materias()"
      [prerequisitos]="pensumService.prerequisitos()"
      [historial]="pensumService.historial()"
      (materiaSeleccionada)="alSeleccionarMateria($event)"
      (seleccionLimpiada)="limpiarSeleccion()"
    />
  } @else {
    <div class="estado-carga">
      <p>Cargando grafo del pensum…</p>
    </div>
  }

</main>
