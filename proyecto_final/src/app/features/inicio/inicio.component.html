<section class="container-fluid p-4" aria-labelledby="inicio-titulo">

  <!-- Breadcrumb -->
  <nav class="breadcrumb-container d-flex align-items-center gap-2 mb-4"
       aria-label="Ruta de navegación">
    <a href="#" aria-label="Inicio"><i class="fas fa-home" aria-hidden="true"></i></a>
    <span class="text-muted"><i class="fas fa-chevron-right fa-xs" aria-hidden="true"></i></span>
    <span class="text-muted">Expediente</span>
  </nav>

  <h1 id="inicio-titulo" class="visually-hidden">Expediente del estudiante</h1>

  <!-- Accesos directos: generados con @for, cada uno es un <article> -->
  <div class="row g-4">
    @for (acceso of accesos; track acceso.titulo) {
      <div class="col-12 col-lg-6">
        <article class="card card-custom h-100">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <h2 class="card-title-custom h5 mb-0">{{ acceso.titulo }}</h2>
              <p class="card-subtitle-custom mb-0">{{ acceso.titulo }}</p>
            </div>
            @if (acceso.ruta) {
              <button class="btn btn-red-custom"
                      [routerLink]="acceso.ruta"
                      [attr.aria-label]="'Ir a ' + acceso.titulo">
                <i class="fas fa-hand-pointer" aria-hidden="true"></i>
              </button>
            } @else {
              <button class="btn btn-red-custom"
                      [attr.aria-label]="acceso.titulo">
                <i class="fas fa-hand-pointer" aria-hidden="true"></i>
              </button>
            }
          </div>
        </article>
      </div>
    }
  </div>

</section>
