<div class="container-fluid py-3 px-4">
  
  <div class="breadcrumb-container d-flex align-items-center gap-2 mb-4 bg-white p-3 rounded">
    <a href="#" class="text-decoration-none text-secondary"><i class="fas fa-home"></i></a>
    <span class="text-muted"><i class="fas fa-chevron-right fa-xs"></i></span>
    <a href="#" class="text-decoration-none text-secondary">Expediente</a>
    <span class="text-muted"><i class="fas fa-chevron-right fa-xs"></i></span>
    <a href="#" class="text-decoration-none text-secondary">Expediente</a>
    <span class="text-muted"><i class="fas fa-chevron-right fa-xs"></i></span>
    <span class="text-muted">Pensum</span>
  </div>

  <div *ngFor="let ciclo of ciclos()" class="mb-5">
    
    <h4 class="mb-3 fw-normal text-dark" style="font-size: 1.5rem;">Ciclo {{ ciclo.ciclo }}</h4>
    
    <div class="row g-0 border-top border-start bg-white grid-materias">
      
      <div class="col-12 col-md-6 col-lg-4 p-4 border-end border-bottom materia-card" 
           *ngFor="let materia of ciclo.listaMaterias">
        
        <div class="d-flex align-items-center gap-1 mb-2">
          <span class="fs-5 text-dark lh-1">{{ materia.codigo }}</span>
          <span class="fw-bold text-dark fs-6 lh-1">{{ materia.uv }} UV</span>
        </div>
        
        <div class="fw-bold text-dark mb-1 lh-sm" style="font-size: 0.95rem;">
          {{ materia.nombre }}
        </div>
        
        <div class="text-muted lh-sm mb-3" style="font-size: 0.85rem;">
          ({{ materia.tipo }})
        </div>
        
        <div class="materia-prerequisitos">
          
          <ng-container *ngIf="materia.listaPrerequisitos.length > 0">
            <span class="badge-req" *ngFor="let req of materia.listaPrerequisitos">
              Req: {{ req }}
            </span>
          </ng-container>

          <ng-container *ngIf="materia.listaPrerequisitos.length === 0">
            <span class="badge-req sin-req">Bachillerato</span>
          </ng-container>

        </div>

      </div>
      
    </div>
  </div>

</div>
